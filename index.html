<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeward</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;

            background: #3A2E28;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;

        }

</head>
<body>
    <canvas id="game" width="480" height="270"></canvas>
    <script type="module" src="src/main.js"></script>

</html>
